<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Memory Annotation - v12 clearer reasons</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #64748b;
      --border: #d8dee8;
      --accent: #2563eb;
      --accent-weak: #e8f0ff;
      --danger: #b42318;
      --ok: #047857;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 14px 22px;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
      letter-spacing: 0;
    }

    main {
      display: grid;
      grid-template-columns: minmax(260px, 300px) minmax(0, 1fr);
      gap: 12px;
      max-width: 1600px;
      margin: 0 auto;
      padding: 12px 18px 18px;
      align-items: start;
    }

    aside,
    section,
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    aside {
      z-index: 3;
      padding: 12px;
      height: calc(100vh - 96px);
      position: sticky;
      top: 84px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    aside .stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
      flex: 1;
    }

    section {
      padding: 18px;
      min-width: 0;
      min-height: calc(100vh - 96px);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
    }

    button,
    .file-label {
      min-height: 34px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 14px;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    input[type="file"] {
      display: none;
    }

    input[type="range"] {
      width: 100%;
      margin: 10px 0 0;
    }

    select,
    input[type="text"],
    input[type="number"],
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 9px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 76px;
      resize: vertical;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 650;
      color: #334155;
      margin-bottom: 5px;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
    }

    .status.ok {
      color: var(--ok);
    }

    .status.warn {
      color: var(--danger);
    }

    .status.pending {
      color: var(--muted);
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #f8fafc;
    }

    .hidden {
      display: none !important;
    }

    select:disabled,
    input:disabled,
    textarea:disabled {
      background: #f1f5f9;
      color: #94a3b8;
      cursor: not-allowed;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .task-nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 2px 2px;
      min-width: 0;
      max-width: 100%;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      flex: 1;
    }

    .task-nav > button {
      flex: 0 0 auto;
      width: 100%;
      padding: 8px 10px;
      min-height: 38px;
      font-size: 12px;
      white-space: nowrap;
      text-align: left;
    }

    .task-nav button.practice-nav {
      min-width: 0;
      font-weight: 700;
    }

    .task-nav button.current {
      border-color: var(--accent);
      background: var(--accent-weak);
      font-weight: 700;
    }

    .task-nav button.done {
      border-color: #86efac;
      background: #ecfdf5;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 8px;
      background: #fff;
      font-size: 12px;
      color: #334155;
    }

    .text-block {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fbfcfe;
    }

    .stored-note-text {
      font-size: 15px;
      line-height: 1.55;
      background: #ffffff;
      border-color: #cbd5e1;
    }

    .control-strip {
      display: grid;
      grid-template-columns: minmax(160px, 220px) minmax(160px, 220px) auto minmax(180px, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .question-sticky {
      position: sticky;
      top: 192px;
      z-index: 1;
      padding: 12px;
      margin: 0 0 12px;
      background: rgba(246, 247, 249, 0.96);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .onboarding {
      display: grid;
      gap: 12px;
      background: #f8fafc;
      border-color: #cbd5e1;
    }

    .example-box {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
    }

    .section-title {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
    }

    .candidate {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      scroll-margin-top: 310px;
    }

    .candidate h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .candidate summary {
      cursor: pointer;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .candidate .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .choice-row,
    .reason-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 10px;
    }

    .choice-btn {
      min-height: 72px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      text-align: left;
      cursor: pointer;
    }

    .reason-option {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 10px;
      background: #fff;
      font-weight: 700;
      color: #0f172a;
      cursor: pointer;
    }

    .reason-option input {
      width: 16px;
      height: 16px;
      margin: 0;
    }
    .reason-label { display:flex; flex-direction:column; gap:2px; line-height:1.25; }
    .reason-title { font-weight:750; color:#0f172a; }
    .reason-help { font-weight:450; font-size:12px; color:var(--muted); }

    .choice-btn.active,
    .reason-option.active {
      border-color: var(--accent);
      background: var(--accent-weak);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.14);
    }

    .choice-title {
      display: block;
      font-weight: 750;
      color: #0f172a;
    }

    .choice-help {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }

    .fact-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 14px;
    }

    .fact-table th,
    .fact-table td {
      border: 1px solid var(--border);
      padding: 7px 8px;
      text-align: left;
      vertical-align: top;
    }

    .fact-table th {
      background: #f8fafc;
      color: #334155;
      font-size: 12px;
      font-weight: 700;
    }

    .split {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
    }

    .progress {
      height: 9px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress > div {
      height: 100%;
      width: 0%;
      background: var(--accent);
    }

    .empty {
      padding: 40px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      main {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
        height: auto;
      }

      .control-strip {
        grid-template-columns: 1fr;
      }

      .question-sticky {
        position: static;
        margin: 0;
        padding: 0;
        border-bottom: 0;
      }

      .candidate .controls,
      .grid,
      .split {
        grid-template-columns: 1fr;
      }
    }

    .instruction-card { border:1px solid var(--border); border-radius:14px; padding:14px; background:#fff; }
    .instruction-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin:12px 0; }
    .tiny-rule { font-size:0.95rem; color:var(--muted); margin-top:4px; }
    .observation-table { display:grid; grid-template-columns:minmax(160px,0.8fr) 1fr; gap:0; border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-top:10px; }
    .observation-table div { padding:9px 10px; border-bottom:1px solid var(--border); }
    .observation-table div:nth-child(odd) { font-weight:700; background:#f8fafc; }
    .observation-table div:nth-last-child(-n+2) { border-bottom:0; }
    .simple-task-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
    .simple-task-head .muted { font-size:0.95rem; }

  
    .intro-panel { padding:22px; max-width:980px; margin:0 auto; }
    .intro-title { margin:0 0 6px; font-size:1.35rem; }
    .intro-subtitle { margin:0 0 14px; color:var(--muted); }
    .step-strip { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; margin:12px 0; }
    .step-card { border:1px solid var(--border); border-radius:14px; padding:14px; background:#fff; display:grid; gap:6px; }
    .step-card strong { font-size:1.05rem; }
    .step-card span { color:var(--muted); font-size:0.95rem; }
    .step-num { width:26px; height:26px; border-radius:999px; display:grid; place-items:center; background:#e8f0ff; color:#1d4ed8; font-weight:800; }
    .quick-rule { margin-top:12px; padding:12px 14px; border-radius:12px; background:#f8fafc; border:1px solid var(--border); }
    .compact-task { gap:10px; }
    .compact-request { padding:12px; }
    @media (max-width: 760px) { .step-strip { grid-template-columns:1fr; } }

  </style>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

      return String(value || fallback)
        .replace(/[^a-zA-Z0-9_-]/g, "_")
        .replace(/_+/g, "_")
        .slice(0, 120);

      cloudState.ready = false;
      cloudState.db = null;
      cloudState.docRef = null;
      cloudState.initPromise = null;
      cloudState.lastRemoteUpdatedAt = 0;
    }

    async function initCloudSync() {
      if (cloudState.initPromise) return cloudState.initPromise;
      cloudState.initPromise = (async () => {
        if (!hasFirebaseConfig()) {
          setCloudStatus("Cloud sync not configured. Add FIREBASE_CONFIG in the HTML to enable autosave.", "warn");
          return null;
        }
        if (!window.firebase || typeof firebase.initializeApp !== "function" || typeof firebase.firestore !== "function") {

        if (!firebase.apps.length) {

            await firebase.auth().signInAnonymously();

        return true;

      return cloudState.initPromise;

    async function loadCloudSnapshot() {
      if (!cloudState.ready || !cloudState.docRef) return null;
      try {
        const snap = await cloudState.docRef.get();
        if (!snap.exists) return null;
        const data = snap.data() || {};

        setCloudStatus(`Cloud load failed: ${error.message}`, "warn");
        return null;
      }

          updated_at: updatedAt,
          last_save_reason: reason,
          page_url: window.location.href

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function escapeCss(value) {
      if (window.CSS && typeof window.CSS.escape === "function") return window.CSS.escape(value);
      return String(value).replace(/[^a-zA-Z0-9_-]/g, "\\$&");

    function parseJsonl(text) {
      const trimmed = text.trim();
      if (trimmed.startsWith("[")) {
        const parsed = JSON.parse(trimmed);
        return parsed;
      }
      if (trimmed.startsWith("{") && !trimmed.includes("\n")) {
        const parsed = JSON.parse(trimmed);
        if (Array.isArray(parsed.tasks)) return parsed.tasks;
        return [parsed];
      }
      return text.split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => JSON.parse(line));
    }

          raw = trimmed.includes(";") ? trimmed.split(";") : [trimmed];

      if (!Array.isArray(raw)) raw = raw ? [raw] : [];
      const selected = new Set(raw.filter(Boolean));
      return reasonCards.map(reason => reason.value).filter(value => selected.has(value));

    function deriveFinalDecision(answer) {
      const usability = answer.candidate_usability || {};
      const normalizedUsability = Object.fromEntries(Object.entries(usability).map(([candidate, value]) => [candidate, normalizeUsabilityValue(value)]));
      const usable = Object.entries(normalizedUsability).filter(([, value]) => value === "usable").map(([candidate]) => candidate);
      const hasUnusable = Object.values(normalizedUsability).some(value => value === "unusable");
      if (!Object.keys(usability).length) {
        return { finalAction: "abstain_no_memory", selectedCandidate: "none", needsCandidateChoice: false };
      }
      if (usable.length === 1) {
        return { finalAction: "answer_from_memory", selectedCandidate: usable[0], needsCandidateChoice: false };

      if (usable.length > 1) {
        const candidatesFromLegacyValue = String(answer.selected_candidate || "").split(";").filter(Boolean);
        const candidatesFromArray = Array.isArray(answer.selected_candidates) ? answer.selected_candidates : [];
        const selected = [...candidatesFromLegacyValue, ...candidatesFromArray].find(candidate => usable.includes(candidate)) || "";

      return {
        finalAction: hasUnusable ? "suppress_all_and_abstain" : "abstain_no_memory",
        selectedCandidate: "none",
        needsCandidateChoice: false

      const values = Object.values(answer.candidate_usability || {}).map(normalizeUsabilityValue);

    function unusableReasonsComplete(answer) {
      const usability = answer.candidate_usability || {};
      const categoriesByCandidate = answer.unusable_reason_category || {};
      const categoryListsByCandidate = answer.unusable_reason_categories || {};
      return Object.entries(usability).every(([candidate, value]) => {
        if (normalizeUsabilityValue(value) !== "unusable") return true;
        return Boolean(categoriesByCandidate[candidate] || normalizeReasonCategories(categoryListsByCandidate[candidate]).length);

    function missingCandidateLabels(answer) {
      const missing = [];
      const usability = answer.candidate_usability || {};
      const categoriesByCandidate = answer.unusable_reason_category || {};
      const categoryListsByCandidate = answer.unusable_reason_categories || {};
      for (const [candidate, value] of Object.entries(usability)) {

      const derived = deriveFinalDecision(answer);
      if (!derived.finalAction) missing.push("final assistant action");
      if (derived.needsCandidateChoice && !derived.selectedCandidate) missing.push("which usable note to answer from");
      return missing.length ? missing : ["none"];

    function isLowQualityExplanation(text) {
      const value = String(text || "").trim().toLowerCase();
      if (!value) return false;
      const compact = value.replace(/[\s.!?,;:]/g, "");
      const generic = new Set(["no", "yes", "ok", "okay", "good", "fine", "done", "na", "n/a", "none"]);
      return compact.length < 5 || generic.has(compact);

    function qualityIssuesForAnswer(task, answer) {
      const issues = [];
      const usability = answer.candidate_usability || {};
      const reasonCategories = answer.unusable_reason_category || {};
      const usable = Object.entries(usability).filter(([, value]) => value === "usable").map(([candidate]) => candidate);
      if (answer.stage2_final_action === "answer_from_memory") {
        if (!answer.selected_candidate || answer.selected_candidate === "none") {
          issues.push("final action uses memory, but no usable note is selected");
        } else if (!usable.includes(answer.selected_candidate)) {
          issues.push(`selected note ${answer.selected_candidate} is not labeled usable`);
        }
      }
      if (usable.length && answer.stage2_final_action !== "answer_from_memory") {
        issues.push("one or more notes are labeled usable, but final action does not answer from memory");
      }
      for (const [candidate, reason] of Object.entries(reasonCategories)) {
        if (reason && usability[candidate] !== "unusable") {
          issues.push(`${candidate} has an unusable reason, but is not labeled No`);
        }
      }
      if (isLowQualityExplanation(answer.rationale_required)) {
        issues.push("optional explanation is too short or generic");
      }
      const elapsed = Number(answer.time_spent_seconds || 0);
      if (elapsed > 0 && elapsed < 3) {
        issues.push(`annotation time is very short (${elapsed}s)`);
      }
      return issues;

    function finalQualityReport() {
      const incomplete = [];
      const quality = [];
      for (const [idx, task] of state.tasks.entries()) {
        const answer = state.answers[task.annotation_id] || defaultAnswer(task);
        const missing = missingRequiredFields(answer).filter(item => item !== "none");
        if (missing.length) {
          incomplete.push({ idx, task, missing });
          continue;
        }
        const issues = qualityIssuesForAnswer(task, answer);
        if (issues.length) quality.push({ idx, task, issues });
      }
      return { incomplete, quality };
    }

        setStatus(`Final check found ${report.incomplete.length} incomplete task(s) and ${report.quality.length} quality flag(s).`, "warn");
        renderFinalReviewPage(report);
        return;
      }
      try {
        await persistAutosaveFile();
      } catch (error) {
        setStatus(`Final check passed, but autosave file failed: ${error.message}.`, "warn");
      }
      await persistCloudSnapshot("complete");
      const prolificUrl = prolificCompletionUrl();

    }

    function candidateChoiceHtml(candidateIds, answer) {
      const selected = String(answer.selected_candidate || "").split(";").filter(Boolean)[0] || "";
      return candidateIds.map(candidate => `
        <label class="pill" style="cursor:pointer">
          <input type="radio" name="selected_candidate" data-selected-candidate="${escapeHtml(candidate)}" ${selected === candidate ? "checked" : ""}>
          ${escapeHtml(candidate)}
        </label>
      `).join("");
    }

    function formatEvidence(value) {
      if (value == null || value === "") return "No explicit evidence provided.";
      if (Array.isArray(value)) {
        if (!value.length) return "No explicit evidence provided.";
        return value.map((item, index) => {
          if (typeof item === "string") return `${index + 1}. ${item}`;
          const event = item.event || "";
          return `${index + 1}. ${event}`;
        }).join("\n");
      }
      if (typeof value === "object") {
        return Object.entries(value).map(([key, item]) => {
          if (Array.isArray(item)) return `${key}: ${item.join("; ")}`;
          return `${key}: ${item}`;
        }).join("\n");
      }
      return String(value);
    }

    function formatCandidateFacts(memory) {
      const facts = Array.isArray(memory.decision_evidence) ? memory.decision_evidence : [];
      return `<div class="text-block">${escapeHtml(formatEvidence(facts))}</div>`;
    }

    function requesterFromContext(context) {
      const text = String(context || "");
      const asksMatch = text.match(/^([^:\n]+?)\s+asks:/i);
      if (asksMatch) return asksMatch[1].replace(/^Question\s*/i, "").trim();
      const quotedMatch = text.match(/Question:\s*\n?([^:\n]+?)\s+asks:/i);
      if (quotedMatch) return quotedMatch[1].trim();
      const unverifiedMatch = text.match(/An unverified person/i);
      if (unverifiedMatch) return "unverified shared-channel requester";
      return "unknown requester";
    }

    function renderTask() {
      if (!state.tasks.length) {
        els.taskPanel.innerHTML = '<div class="empty">Load `annotation_tasks.jsonl` from the annotation package.</div>';
        renderSidebar();
        return;
      }
      if (state.practiceIndex !== null) {
        renderPracticePage();
        return;
      }
      const task = state.tasks[state.index];
      const answer = answerFor(task);
      if (!answer.started_at_ms) {
        answer.started_at_ms = String(Date.now());
        state.answers[task.annotation_id] = answer;
        persistLocal();
      }
      const candidateIds = (task.candidate_memories || []).map(m => m.candidate_id);
      const noStoredNotes = candidateIds.length === 0;
      const candidateCountText = candidateIds.length === 1 ? "Only one stored note exists." : `${candidateIds.length} stored notes are available.`;
      const missingFields = missingRequiredFields(answer);
      const taskComplete = missingFields[0] === "none";
      const derived = deriveFinalDecision(answer);
      const selectableCandidateIds = derived.usableCandidates || candidateIds;

      els.taskPanel.innerHTML = `
        <div class="stack compact-task">
          <div class="question-sticky compact-request">
            <div class="section-title">Request</div>
            <div class="text-block">${escapeHtml(task.current_context)}</div>
          </div>
          <div class="stack">
            <div class="section-title">Stored notes</div>
            ${candidateIds.length ? (task.candidate_memories || []).map(memory => renderCandidate(memory, answer)).join("") : '<div class="text-block">No stored notes are available for this question. There is no note to judge.</div>'}
          </div>
          <div class="panel" style="padding:12px">
            <div class="section-title">Finish this question</div>
            <div id="finalActionLockNotice" class="status ${taskComplete ? "ok" : "pending"}" style="margin-bottom:10px">
              ${taskComplete ? "This annotation is complete. The final answer is derived from your labels and is hidden while you work." : missingChecklistHtml(missingFields)}
            </div>
            <div class="grid">
              <div id="selectedCandidateRow" class="${derived.needsCandidateChoice ? "" : "hidden"}">
                <label>More than one note is usable. Which note should answer the request?</label>
                <div class="meta">${candidateChoiceHtml(selectableCandidateIds, answer)}</div>
              </div>
            </div>
            <div id="followupFields" class="${!noStoredNotes && answerNeedsFollowup(answer) ? "" : "hidden"}">
              <div class="split" style="margin-top:12px">
                <div>
                  <label>Optional: explain your decision.</label>
                  <textarea id="rationale_required" placeholder="Write one sentence about why this note is safe, unsafe, or not enough. Ctrl+Enter saves from this field.">${escapeHtml(answer.rationale_required)}</textarea>
                </div>
                <div>
                  <label>Notes optional</label>
                  <textarea id="notes_optional" placeholder="Optional notes. Ctrl+Enter saves from this field.">${escapeHtml(answer.notes_optional)}</textarea>
                </div>
              </div>
            </div>
            <div class="toolbar" style="margin-top:12px">
              <button id="saveOnly">Save</button>
              <button id="saveNext" class="primary">Save and Next</button>
            </div>
          </div>
        </div>
      `;

      bindTaskInputs();
      renderSidebar();
    }

    function practiceAnswerFor(exampleId) {
      const raw = state.practiceAnswers[exampleId];
      if (raw && typeof raw === "object") {
        return { usability: normalizeUsabilityValue(raw.usability || ""), reasons: normalizeReasonCategories(raw.reasons || []) };
      }
      return { usability: normalizeUsabilityValue(raw || ""), reasons: [] };
    }

    function renderPracticePage() {
      const example = practiceExamples[state.practiceIndex || 0];
      if (example && example.type === "intro") {
        els.taskPanel.innerHTML = `
          <div class="panel intro-panel">
            <h2 class="intro-title">What you will do</h2>
            <p class="intro-subtitle">You will see a user request and several stored notes. Judge each stored note separately.</p>
            <div class="quick-rule">
              Your job is not to fact-check the note. Decide whether the assistant may safely rely on this note for the current request.
            </div>
            <h3 class="intro-title" style="font-size:22px;margin-top:22px">Use the note only when all three checks pass</h3>
            <div class="step-strip">
              <div class="step-card"><div class="step-num">1</div><strong>Match</strong><span>Same person + same project.</span></div>
              <div class="step-card"><div class="step-num">2</div><strong>Current</strong><span>Not expired or replaced.</span></div>
              <div class="step-card"><div class="step-num">3</div><strong>Answer</strong><span>Contains the exact requested fact.</span></div>
            </div>
            <div class="quick-rule">
              If any check fails, choose <strong>Do not use</strong> and select the observed reason.
            </div>
            <div class="toolbar" style="justify-content:flex-end;margin-top:16px">
              <button type="button" class="primary" data-practice-next>Start Example 0</button>
            </div>
          </div>`;
        bindTaskInputs();
        renderSidebar();
        return;
      }
      const answer = practiceAnswerFor(example.id);
      const choices = usabilityChoices.map(choice => `
        <button type="button"
          class="choice-btn ${answer.usability === choice.value ? "active" : ""}"
          data-practice-choice="${escapeHtml(choice.value)}"
          data-practice-id="${escapeHtml(example.id)}">
          <span class="choice-title">${escapeHtml(choice.title)}</span>
        </button>
      `).join("");
      const reasonOptions = reasonCards.map(reason => `
        <label class="reason-option ${answer.reasons.includes(reason.value) ? "active" : ""}">
          <input type="checkbox"
            ${answer.reasons.includes(reason.value) ? "checked" : ""}
            data-practice-reason="${escapeHtml(reason.value)}"
            data-practice-id="${escapeHtml(example.id)}">
          <span class="reason-label"><span class="reason-title">${escapeHtml(reason.title)}</span><span class="reason-help">${escapeHtml(reason.help || "")}</span></span>
        </label>
      `).join("");
      const answered = Boolean(answer.usability) && (answer.usability !== "unusable" || answer.reasons.length > 0);
      const correctReasons = normalizeReasonCategories(example.correctReasons || []);
      const correct = answer.usability === example.correct &&
        (example.correct !== "unusable" || correctReasons.every(reason => answer.reasons.includes(reason)));
      const selectedTitle = usabilityChoices.find(choice => choice.value === answer.usability)?.title || answer.usability;
      const isLastPractice = (state.practiceIndex || 0) >= practiceExamples.length - 1;
      const practiceCta = isLastPractice ? "Start test" : "Next question";
      els.taskPanel.innerHTML = `
        <div class="simple-task-head">
          <strong>${escapeHtml(example.title)}</strong>
          <span class="muted">Pick the safest label, then check the observable reason.</span>
        </div>
        <div class="example-box" style="margin-top:12px">
          <div><strong>Question:</strong> ${escapeHtml(example.question)}</div>
          <div><strong>Stored note:</strong> ${escapeHtml(example.note)}</div>
          <div class="choice-row">${choices}</div>
          <div class="reason-field ${answer.usability === "unusable" ? "" : "hidden"}" style="margin-top:10px">
            <label>What makes this note unusable?</label>
            <div class="reason-grid">${reasonOptions}</div>
          </div>
          ${answered ? `
            <div class="status ${correct ? "ok" : "warn"}" style="margin-top:10px">
              <strong>${correct ? "Correct." : "Not quite."}</strong>
              You chose ${escapeHtml(selectedTitle)}. Correct answer: ${escapeHtml(example.answer)}
            </div>
            <div><strong>What to notice:</strong> ${escapeHtml(example.assumption || "Check the visible facts in the request and stored note before choosing a label.")}</div>
            <div><strong>Logic:</strong> ${escapeHtml(example.logic)}</div>
          ` : ""}
          <div class="toolbar" style="justify-content:flex-end;margin-top:14px">
            <button type="button" class="primary" data-practice-next>${escapeHtml(practiceCta)}</button>
          </div>
        </div>
      `;
      bindTaskInputs();
      renderSidebar();
    }

    function renderCandidate(memory, answer) {
      const id = memory.candidate_id;
      const task = state.tasks[state.index];
      const candidateCount = (task?.candidate_memories || []).length;
      const candidateIndex = Math.max(0, (task?.candidate_memories || []).findIndex(item => item.candidate_id === id));
      const usability = normalizeUsabilityValue(answer.candidate_usability?.[id] || "");
      const storedReasonList = normalizeReasonCategories(answer.unusable_reason_categories?.[id]);
      const selectedReasons = storedReasonList.length ? storedReasonList : normalizeReasonCategories(answer.unusable_reason_category?.[id] || "");
      const selectedReason = primaryReasonCategory(selectedReasons);
      const showReasons = usability === "unusable";
      const usabilityButtons = usabilityChoices.map(choice => `
        <button type="button"
          class="choice-btn ${usability === choice.value ? "active" : ""}"
          data-usability-choice="${escapeHtml(choice.value)}"
          data-candidate-choice="${escapeHtml(id)}">
          <span class="choice-title">${escapeHtml(choice.title)}</span>
          <span class="choice-help">${escapeHtml(choice.help)}</span>
        </button>
      `).join("");
      const reasonButtons = reasonCards.map(reason => `
        <label class="reason-option ${selectedReasons.includes(reason.value) ? "active" : ""}">
          <input type="checkbox"
            ${selectedReasons.includes(reason.value) ? "checked" : ""}
            data-reason-choice="${escapeHtml(reason.value)}"
            data-candidate-choice="${escapeHtml(id)}">
          <span class="reason-label"><span class="reason-title">${escapeHtml(reason.title)}</span><span class="reason-help">${escapeHtml(reason.help || "")}</span></span>
        </label>
      `).join("");
      return `
        <details class="candidate" data-candidate-card="${escapeHtml(id)}" ${id === "A" ? "open" : ""}>
          <summary>Stored note ${escapeHtml(id)}</summary>
          <div>
            <label>Stored note</label>
            <div class="text-block stored-note-text">${escapeHtml(memory.text || "No note text is available.")}</div>
          </div>
          <div class="controls">
            <div>
              <label>Can this note be used to answer the current request?</label>
              <input type="hidden" data-field="candidate_usability" data-candidate="${escapeHtml(id)}" value="${escapeHtml(usability)}">
              <div class="choice-row" data-usability-group="${escapeHtml(id)}">${usabilityButtons}</div>
            </div>
            <div class="reason-field ${showReasons ? "" : "hidden"}" data-reason-for="${escapeHtml(id)}">
              <label>What makes this note unusable?</label>
              <input type="hidden" data-field="unusable_reason_category" data-candidate="${escapeHtml(id)}" value="${escapeHtml(showReasons ? selectedReason : "")}">
              <input type="hidden" data-field="unusable_reason_categories" data-candidate="${escapeHtml(id)}" value="${escapeHtml(showReasons ? JSON.stringify(selectedReasons) : "[]")}">
              <div class="reason-grid" data-reason-group="${escapeHtml(id)}">${reasonButtons}</div>
            </div>
          </div>
        </details>
      `;
    }

    function bindTaskInputs() {
      document.querySelectorAll("[data-practice-choice]").forEach(button => {
        button.addEventListener("click", () => {
          state.practiceAnswers[button.dataset.practiceId] = {
            usability: button.dataset.practiceChoice || "",
            reasons: []
          };
          renderTask();
        });
      });
      document.querySelectorAll("[data-practice-reason]").forEach(input => {
        input.addEventListener("change", () => {
          const answer = practiceAnswerFor(input.dataset.practiceId);
          const selected = new Set(answer.reasons);
          const reason = input.dataset.practiceReason || "";
          if (input.checked) {
            selected.add(reason);
          } else {
            selected.delete(reason);
          }
          state.practiceAnswers[input.dataset.practiceId] = {
            usability: "unusable",
            reasons: reasonCards.map(item => item.value).filter(value => selected.has(value))
          };
          renderTask();
        });
      });
      document.querySelector("[data-practice-next]")?.addEventListener("click", () => {
        moveToPosition(Math.min(currentPosition() + 1, totalPositions() - 1));
        renderTask();
      });
      document.querySelectorAll("[data-field][data-candidate]").forEach(input => {
        input.addEventListener("change", () => {
          if (input.dataset.field === "candidate_usability") {
            syncCandidateReasonControls();
          }
          syncFinalActionControls();
          saveCurrent(false);
        });
      });
      document.querySelectorAll("[data-usability-choice]").forEach(button => {
        button.addEventListener("click", () => {
          const candidate = button.dataset.candidateChoice;
          const input = document.querySelector(`[data-field="candidate_usability"][data-candidate="${escapeCss(candidate)}"]`);
          if (!input) return;
          input.value = button.dataset.usabilityChoice || "";
          syncCandidateReasonControls();
          syncFinalActionControls();
          saveCurrent(false);
        });
      });
      document.querySelectorAll("[data-reason-choice]").forEach(button => {
        button.addEventListener("click", () => {
          const candidate = button.dataset.candidateChoice;
          const primaryInput = document.querySelector(`[data-field="unusable_reason_category"][data-candidate="${escapeCss(candidate)}"]`);
          const listInput = document.querySelector(`[data-field="unusable_reason_categories"][data-candidate="${escapeCss(candidate)}"]`);
          if (!primaryInput || !listInput) return;
          const selected = new Set(normalizeReasonCategories(listInput.value));
          const reason = button.dataset.reasonChoice || "";
          if (selected.has(reason)) {
            selected.delete(reason);
          } else if (reason) {
            selected.add(reason);
          }
          const ordered = reasonCards.map(item => item.value).filter(value => selected.has(value));
          listInput.value = JSON.stringify(ordered);
          primaryInput.value = primaryReasonCategory(ordered);
          syncCandidateReasonControls();
          syncFinalActionControls();
          saveCurrent(false);
        });
      });
      ["rationale_required", "notes_optional"].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener("change", () => {
          syncFinalActionControls();
          saveCurrent(false);
        });
        el.addEventListener("input", debounce(() => saveCurrent(false), 350));
      });
      document.querySelectorAll("[data-selected-candidate]").forEach(input => {
        input.addEventListener("change", () => {
          syncFinalActionControls();
          saveCurrent(false);
        });
      });
      syncCandidateReasonControls();
      syncFinalActionControls();
      document.getElementById("saveOnly")?.addEventListener("click", () => saveCurrent(false));
      document.getElementById("saveNext")?.addEventListener("click", () => saveCurrent(true));
    }

    function syncCandidateReasonControls() {
      document.querySelectorAll('[data-field="candidate_usability"]').forEach(usabilitySelect => {
        const candidate = usabilitySelect.dataset.candidate;
        const enabled = usabilitySelect.value === "unusable";
        document.querySelectorAll(`[data-usability-group="${escapeCss(candidate)}"] [data-usability-choice]`).forEach(button => {
          button.classList.toggle("active", button.dataset.usabilityChoice === usabilitySelect.value);
        });
        document.querySelectorAll(`[data-reason-for="${escapeCss(candidate)}"]`).forEach(wrapper => {
          wrapper.classList.toggle("hidden", !enabled);
          const primaryInput = wrapper.querySelector('[data-field="unusable_reason_category"]');
          const listInput = wrapper.querySelector('[data-field="unusable_reason_categories"]');
          if (!primaryInput || !listInput) return;
          primaryInput.disabled = !enabled;
          listInput.disabled = !enabled;
          if (!enabled) {
            primaryInput.value = "";
            listInput.value = "[]";
          } else {
            const selectedReasons = normalizeReasonCategories(listInput.value || primaryInput.value);
            listInput.value = JSON.stringify(selectedReasons);
            primaryInput.value = primaryReasonCategory(selectedReasons);
          }
          const selected = new Set(normalizeReasonCategories(listInput.value));
          wrapper.querySelectorAll("[data-reason-choice]").forEach(button => {
            const active = enabled && selected.has(button.dataset.reasonChoice);
            button.checked = active;
            button.closest(".reason-option")?.classList.toggle("active", active);
            button.disabled = !enabled;
          });
        });
      });
    }

    function currentCandidateStateFromDom() {
      const answer = { candidate_usability: {}, unusable_reason_category: {}, unusable_reason_categories: {}, unusable_reason_detail: {} };
      document.querySelectorAll("[data-field][data-candidate]").forEach(input => {
        const field = input.dataset.field;
        const candidate = input.dataset.candidate;
        answer[field][candidate] = field === "unusable_reason_categories" ? normalizeReasonCategories(input.value) : input.value;
      });
      return answer;
    }

    function collectCurrentAnswerPreview(task) {
      const answer = JSON.parse(JSON.stringify(answerFor(task)));
      const candidateState = currentCandidateStateFromDom();
      answer.candidate_usability = candidateState.candidate_usability;
      answer.unusable_reason_category = candidateState.unusable_reason_category;
      answer.unusable_reason_categories = candidateState.unusable_reason_categories;
      answer.unusable_reason_detail = candidateState.unusable_reason_detail;
      for (const id of ["rationale_required", "notes_optional"]) {
        const el = document.getElementById(id);
        answer[id] = el ? el.value : "";
      }
      answer.uncertain_reason = "";
      answer.confidence_1_5 = "";
      answer.selected_candidate = document.querySelector("[data-selected-candidate]:checked")?.dataset.selectedCandidate || "";
      answer.selected_candidates = answer.selected_candidate ? [answer.selected_candidate] : [];
      const derived = deriveFinalDecision(answer);
      answer.stage2_final_action = derived.finalAction;
      answer.selected_candidate = derived.selectedCandidate;
      answer.selected_candidate_if_answer = answer.stage2_final_action === "answer_from_memory" ? answer.selected_candidate : "";
      answer.primary_evidence_used = [];
      return answer;
    }

    function syncFinalActionControls() {
      const candidateState = currentCandidateStateFromDom();
      const notice = document.getElementById("finalActionLockNotice");
      const task = state.tasks[state.index];
      const preview = task ? collectCurrentAnswerPreview(task) : candidateState;
      const derived = deriveFinalDecision(preview);
      const missingFields = missingRequiredFields(preview);
      const taskComplete = missingFields[0] === "none";
      if (notice) {
        notice.innerHTML = taskComplete
              ? "This annotation is complete. The final assistant response will be computed after saving and is not shown during labeling."
              : missingChecklistHtml(missingFields);
        notice.className = `status ${taskComplete ? "ok" : "pending"}`;
        notice.style.marginBottom = "10px";
      }
      const finalActionDisplay = document.getElementById("derivedFinalAction");
      if (finalActionDisplay) finalActionDisplay.textContent = displayLabel(derived.finalAction || "");
      const selectedCandidateRow = document.getElementById("selectedCandidateRow");
      if (selectedCandidateRow) selectedCandidateRow.classList.toggle("hidden", !derived.needsCandidateChoice);
      const followupFields = document.getElementById("followupFields");
      if (followupFields) followupFields.classList.toggle("hidden", !answerNeedsFollowup(preview));
    }

    function collectCurrentAnswer() {
      const task = state.tasks[state.index];
      const answer = answerFor(task);
      answer.annotator_id = els.annotatorId.value || "";
      answer.task_set = els.taskSetName.value || "";
      answer.candidate_usability = {};
      answer.unusable_reason_category = {};
      answer.unusable_reason_categories = {};
      answer.unusable_reason_detail = {};
      document.querySelectorAll("[data-field][data-candidate]").forEach(input => {
        const field = input.dataset.field;
        const candidate = input.dataset.candidate;
        if (field === "candidate_usability") {
          answer[field][candidate] = normalizeUsabilityValue(input.value);
        } else if (answer.candidate_usability[candidate] !== "unusable") {
          answer[field][candidate] = field === "unusable_reason_categories" ? [] : "";
        } else {
          answer[field][candidate] = field === "unusable_reason_categories" ? normalizeReasonCategories(input.value) : input.value;
        }
      });
      for (const [candidate, categories] of Object.entries(answer.unusable_reason_categories)) {
        answer.unusable_reason_category[candidate] = answer.candidate_usability[candidate] === "unusable"
          ? primaryReasonCategory(categories)
          : "";
      }
      for (const id of ["rationale_required", "notes_optional"]) {
        const el = document.getElementById(id);
        answer[id] = el ? el.value : "";
      }
      answer.uncertain_reason = "";
      answer.confidence_1_5 = "";
      answer.selected_candidate = document.querySelector("[data-selected-candidate]:checked")?.dataset.selectedCandidate || "";
      answer.selected_candidates = answer.selected_candidate ? [answer.selected_candidate] : [];
      const derived = deriveFinalDecision(answer);
      answer.stage2_final_action = derived.finalAction;
      answer.selected_candidate = derived.selectedCandidate;
      answer.primary_evidence_used = [];
      answer.selected_candidate_if_answer = answer.stage2_final_action === "answer_from_memory" ? answer.selected_candidate : "";
      if (!answer.started_at_ms) answer.started_at_ms = String(Date.now());
      const elapsed = Math.max(0, Math.round((Date.now() - Number(answer.started_at_ms || Date.now())) / 1000));
      answer.time_spent_seconds = String(elapsed);
      answer.label_expose_suppress_abstain = legacyLabelFor(answer.stage2_final_action);
      answer.saved_at = new Date().toISOString();
      state.answers[task.annotation_id] = answer;
      return answer;
    }

    async function saveCurrent(advance) {
      if (!state.tasks.length) return;
      if (state.practiceIndex !== null) {
        if (advance) {
          moveToPosition(Math.min(currentPosition() + 1, totalPositions() - 1));
        } else {
          renderSidebar();
        }
        return;
      }
      const answer = collectCurrentAnswer();
      persistLocal();
      await initCloudSync();
      try {
        await persistAutosaveFile();
        setStatus(`Saved ${state.tasks[state.index].annotation_id}.`, "ok");
      } catch (error) {
        setStatus(`Saved locally, but autosave file failed: ${error.message}`, "warn");
      }
      await persistCloudSnapshot(advance ? "save_and_advance" : "autosave");
      if (advance && !isComplete(answer)) {
        const missing = missingFieldsText(missingRequiredFields(answer));
        setStatus(`Saved ${state.tasks[state.index].annotation_id}, but it is incomplete. Missing: ${missing}.`, "warn");
        renderSidebar();
        return;
      }
      if (advance && currentPosition() < totalPositions() - 1) {
        moveToPosition(currentPosition() + 1);
        renderTask();
      } else if (advance && state.index === state.tasks.length - 1) {
        await completeAnnotationRun();
      } else {
        renderSidebar();
      }
    }

    function totalPositions() {
      return practiceExamples.length + state.tasks.length;
    }

    function currentPosition() {
      return state.practiceIndex !== null ? state.practiceIndex : practiceExamples.length + state.index;
    }

    function moveToPosition(position) {
      if (position < practiceExamples.length) {
        state.practiceIndex = position;
        state.index = 0;
      } else {
        state.practiceIndex = null;
        state.index = Math.max(0, Math.min(state.tasks.length - 1, position - practiceExamples.length));
      }
    }

    function practiceComplete(example) {
      const answer = practiceAnswerFor(example.id);
      return Boolean(answer.usability) && (answer.usability !== "unusable" || answer.reasons.length > 0);
    }

    function renderSidebar() {
      const total = state.tasks.length;
      const position = currentPosition();
      const done = Object.values(state.answers).filter(isComplete).length;
      els.currentCounter.textContent = total ? (state.practiceIndex !== null ? (practiceExamples[state.practiceIndex]?.type === "intro" ? "Intro" : practiceExamples[state.practiceIndex]?.title || `Example ${state.practiceIndex}`) : `${state.index + 1} / ${total}`) : "0 / 0";
      els.doneCounter.textContent = String(done);
      els.progressBar.style.width = total ? `${Math.round((done / total) * 100)}%` : "0%";
      els.prevTask.disabled = !total || position === 0;
      els.nextTask.disabled = !total || position >= totalPositions() - 1;
      const practiceNav = practiceExamples.map((example, idx) => {
        const cls = [
          state.practiceIndex === idx ? "current" : "",
          practiceComplete(example) ? "done" : ""
        ].filter(Boolean).join(" ");
        return `<button class="practice-nav ${cls}" data-practice-go="${idx}">${escapeHtml(example.title)}</button>`;
      }).join("");
      const taskNav = state.tasks.map((task, idx) => {
        const answer = state.answers[task.annotation_id];
        const cls = [
          state.practiceIndex === null && idx === state.index ? "current" : "",
          isComplete(answer) ? "done" : ""
        ].filter(Boolean).join(" ");
        return `<button class="${cls}" data-task-go="${idx}">${idx + 1}</button>`;
      }).join("");
      els.taskNav.innerHTML = practiceNav + taskNav;
      els.taskNav.querySelectorAll("[data-practice-go]").forEach(button => {
        button.addEventListener("click", () => {
          if (state.practiceIndex === null) {
            collectCurrentAnswer();
            persistLocal();
          }
          state.practiceIndex = Number(button.dataset.practiceGo);
          state.index = 0;
          renderTask();
        });
      });
      els.taskNav.querySelectorAll("[data-task-go]").forEach(button => {
        button.addEventListener("click", () => {
          if (state.practiceIndex === null) {
            collectCurrentAnswer();
            persistLocal();
          }
          state.practiceIndex = null;
          state.index = Number(button.dataset.taskGo);
          renderTask();
        });
      });
      els.taskNav.querySelector(".current")?.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
    }

    function debounce(fn, ms) {
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), ms);
      };
    }

    function answersArray() {
      return state.tasks.map(task => state.answers[task.annotation_id] || defaultAnswer(task));
    }

    function download(name, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function csvEscape(value) {
      const s = typeof value === "object" ? JSON.stringify(value) : String(value ?? "");
      return /[",\n]/.test(s) ? `"${s.replaceAll('"', '""')}"` : s;
    }

    function exportCsv() {
      const fields = [
        "annotation_id",
        "annotator_id",
        "task_set",
        "candidate_usability",
        "unusable_reason_category",
        "unusable_reason_categories",
        "unusable_reason_detail",
        "stage2_final_action",
        "selected_candidate",
        "selected_candidates",
        "selected_candidate_if_answer",
        "label_expose_suppress_abstain",
        "rationale_required",
        "confidence_1_5",
        "primary_evidence_used",
        "uncertain_reason",
        "time_spent_seconds",
        "started_at_ms",
        "notes_optional",
        "saved_at"
      ];
      const rows = [fields.join(",")];
      for (const answer of answersArray()) {
        rows.push(fields.map(field => csvEscape(answer[field])).join(","));
      }
      download("annotations.csv", rows.join("\n") + "\n", "text/csv");
    }

    function exportJsonl() {
      const content = answersArray().map(answer => JSON.stringify(answer)).join("\n") + "\n";
      download("annotations.jsonl", content, "application/jsonl");
    }

    els.taskFile.addEventListener("change", async event => {
      const file = event.target.files[0];
      if (!file) return;
      const text = await file.text();
      let tasks;
      try {
        tasks = parseJsonl(text);
      } catch (error) {
        setStatus(`Could not parse tasks: ${error.message}`, "warn");
        return;
      }
      installTasks(tasks, fileKeyFor(file, tasks), file.name.replace(/\.[^.]+$/, ""));
    });

    els.chooseAutosave.addEventListener("click", async () => {
      if (!window.showSaveFilePicker) {
        setStatus("This browser does not support direct file autosave. Use export instead.", "warn");
        return;
      }
      try {
        state.autosaveHandle = await window.showSaveFilePicker({
          suggestedName: "agent_memory_annotations_autosave.json",
          types: [{ description: "JSON", accept: { "application/json": [".json"] } }]
        });
        await persistAutosaveFile();
        setStatus("Autosave file connected.", "ok");
      } catch (error) {
        if (error.name !== "AbortError") setStatus(`Autosave setup failed: ${error.message}`, "warn");
      }
    });

    els.exportJsonl.addEventListener("click", exportJsonl);
    els.exportCsv.addEventListener("click", exportCsv);
    els.clearLocal.addEventListener("click", () => {
      if (!confirm("Clear local draft for this annotator and task set? This removes saved answers from this browser only.")) return;
      localStorage.removeItem(storageKey());
      state.answers = {};
      setStatus("Local draft cleared.", "ok");
      renderTask();
    });
    els.prevTask.addEventListener("click", () => {
      if (state.practiceIndex === null) {
        collectCurrentAnswer();
        persistLocal();
      }
      moveToPosition(Math.max(0, currentPosition() - 1));
      renderTask();
    });
    els.nextTask.addEventListener("click", () => {
      if (state.practiceIndex === null) {
        collectCurrentAnswer();
        persistLocal();
      }
      moveToPosition(Math.min(totalPositions() - 1, currentPosition() + 1));
      renderTask();
    });
    els.annotatorId.addEventListener("change", () => {
      loadLocal();
      resetCloudSync();
      void initCloudSync();
      renderTask();
    });

    els.taskSetName.addEventListener("change", () => {
      resetCloudSync();
      void initCloudSync();
    });

    document.addEventListener("keydown", event => {
      if (event.key !== "Enter") return;
      const tag = document.activeElement?.tagName;
      if (tag === "TEXTAREA" && !event.ctrlKey && !event.metaKey) return;
      if (tag === "SELECT") return;
      event.preventDefault();
      saveCurrent(true);
    });

    window.addEventListener("beforeunload", () => {
      try {
        if (state.tasks.length) {
          collectCurrentAnswer();
          persistLocal();
        }
      } catch {
        // Ignore unload errors.
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden" && state.tasks.length) {
        try {
          collectCurrentAnswer();
          persistLocal();
          void persistCloudSnapshot("visibility_hidden");
        } catch {
          // Ignore hidden-tab errors.
        }
      }
    });

    async function autoLoadDefaultTasks() {
      if (Array.isArray(window.DEFAULT_ANNOTATION_TASKS) && window.DEFAULT_ANNOTATION_TASKS.length) {
        const tasks = window.DEFAULT_ANNOTATION_TASKS;
        installTasks(tasks, defaultFileKey(tasks), "agent_memory_human_annotation_package_en50_stratified");
        return;
      }
      setStatus("Embedded tasks were not found. Use Load tasks if you were given a separate JSONL file.", "warn");
      renderTask();
    }

    autoLoadDefaultTasks();
  </script>

  <script>
    (function () {
      function renderRequesterPill(task) {
        const requester = requesterFromContext(task.current_context || "");
        return `
          <span class="mini-badge accent">${escapeHtml(requester)}</span>
          <span class="mini-badge">${escapeHtml(task.ambiguity_type || "annotation")}</span>
          <span class="mini-badge">${escapeHtml(task.candidate_count || 0)} notes</span>
        `;
      }

      function candidateStatusLabel(usability, selectedReason) {
        if (usability === "usable") return `<span class="mini-badge ok">Usable</span>`;
        if (usability === "unusable") return `<span class="mini-badge warn">${escapeHtml(displayLabel(selectedReason || "unusable"))}</span>`;
        if (usability === "uncertain") return `<span class="mini-badge">Uncertain</span>`;
        return `<span class="mini-badge">Not set</span>`;
      }

      window.renderCandidate = function renderCandidate(memory, answer) {
        const id = memory.candidate_id;
        const task = state.tasks[state.index];
        const usability = normalizeUsabilityValue(answer.candidate_usability?.[id] || "");
        const storedReasonList = normalizeReasonCategories(answer.unusable_reason_categories?.[id]);
        const selectedReasons = storedReasonList.length ? storedReasonList : normalizeReasonCategories(answer.unusable_reason_category?.[id] || "");
        const selectedReason = primaryReasonCategory(selectedReasons);
        const showReasons = usability === "unusable";
        const about = memory.about_note || {};
        const usabilityButtons = usabilityChoices.map(choice => `
          <button type="button"
            class="choice-btn ${usability === choice.value ? "active" : ""}"
            data-usability-choice="${escapeHtml(choice.value)}"
            data-candidate-choice="${escapeHtml(id)}">
            <span class="choice-title">${escapeHtml(choice.title)}</span>
            <span class="choice-help">${escapeHtml(choice.help)}</span>
          </button>
        `).join("");
        const reasonButtons = reasonCards.map(reason => `
          <label class="reason-option ${selectedReasons.includes(reason.value) ? "active" : ""}">
            <input type="checkbox"
              ${selectedReasons.includes(reason.value) ? "checked" : ""}
              data-reason-choice="${escapeHtml(reason.value)}"
              data-candidate-choice="${escapeHtml(id)}">
            <span class="reason-label"><span class="reason-title">${escapeHtml(reason.title)}</span><span class="reason-help">${escapeHtml(reason.help || "")}</span></span>
          </label>
        `).join("");
        return `
          <details class="candidate-card" data-candidate-card="${escapeHtml(id)}">
            <summary class="candidate-summary">
              <strong>Candidate ${escapeHtml(id)}</strong>
              ${candidateStatusLabel(usability, selectedReason)}
              ${task?.candidate_memories?.length ? `<span class="summary-muted">${escapeHtml(task?.candidate_memories?.length === 1 ? "Tap to inspect note" : "Tap to inspect note")}</span>` : ""}
            </summary>
            <div class="candidate-body">
              <div>
                <label>Stored note</label>
                <div class="text-block stored-note-text note-preview">${escapeHtml(memory.text || "No note text is available.")}</div>
              </div>
              <div>
                <label>Can this note be used to answer the current request?</label>
                <input type="hidden" data-field="candidate_usability" data-candidate="${escapeHtml(id)}" value="${escapeHtml(usability)}">
                <div class="choice-row" data-usability-group="${escapeHtml(id)}">${usabilityButtons}</div>
              </div>
              <div class="reason-field ${showReasons ? "" : "hidden"}" data-reason-for="${escapeHtml(id)}">
                <label>What makes this note unusable?</label>
                <input type="hidden" data-field="unusable_reason_category" data-candidate="${escapeHtml(id)}" value="${escapeHtml(showReasons ? selectedReason : "")}">
                <input type="hidden" data-field="unusable_reason_categories" data-candidate="${escapeHtml(id)}" value="${escapeHtml(showReasons ? JSON.stringify(selectedReasons) : "[]")}">
                <div class="reason-grid" data-reason-group="${escapeHtml(id)}">${reasonButtons}</div>
              </div>
            </div>
          </details>
        `;
      };

      window.renderTask = function renderTask() {
        if (!state.tasks.length) {
          els.taskPanel.innerHTML = '<div class="empty">Load `annotation_tasks.jsonl` from the annotation package.</div>';
          renderSidebar();
          return;
        }
        if (state.practiceIndex !== null) {
          renderPracticePage();
          return;
        }
        const task = state.tasks[state.index];
        const answer = answerFor(task);
        if (!answer.started_at_ms) {
          answer.started_at_ms = String(Date.now());
          state.answers[task.annotation_id] = answer;
          persistLocal();
        }
        const candidateIds = (task.candidate_memories || []).map(m => m.candidate_id);
        const noStoredNotes = candidateIds.length === 0;
        const missingFields = missingRequiredFields(answer);
        const taskComplete = missingFields[0] === "none";
        const derived = deriveFinalDecision(answer);
        const selectableCandidateIds = derived.usableCandidates || candidateIds;
        const noteCount = candidateIds.length;
        const countLabel = noteCount === 1 ? "1 stored note" : `${noteCount} stored notes`;

        els.taskPanel.innerHTML = `
          <div class="stack compact-task">
            <div class="request-card sticky-request">
              <div class="request-title-row">
                <div class="request-title">
                  <span>Request</span>
                  ${renderRequesterPill(task)}
                </div>
                <span class="mini-badge">${escapeHtml(task.annotation_id || "")}</span>
              </div>
              <div class="text-block">${escapeHtml(task.current_context || "")}</div>
            </div>

            <div class="stack">
              <div class="request-title-row" style="margin:0">
                <div class="request-title"><span>Stored notes</span></div>
                <span class="compact-help">${escapeHtml(countLabel)} to judge</span>
              </div>
              <div class="candidate-list">
                ${candidateIds.length ? (task.candidate_memories || []).map(memory => renderCandidate(memory, answer)).join("") : '<div class="text-block">No stored notes are available for this question. There is no note to judge.</div>'}
              </div>
            </div>

            <div class="final-card">
              <div class="section-title">Finish</div>
              <div id="finalActionLockNotice" class="status ${taskComplete ? "ok" : "pending"}">
                ${taskComplete ? "This annotation is complete. The final answer is derived after saving and stays hidden while you work." : missingChecklistHtml(missingFields)}
              </div>

              <div id="selectedCandidateRow" class="${derived.needsCandidateChoice ? "" : "hidden"}">
                <label>More than one note is usable. Which note should answer the request?</label>
                <div class="meta">${candidateChoiceHtml(selectableCandidateIds, answer)}</div>
              </div>

              <div id="followupFields" class="${!noStoredNotes && answerNeedsFollowup(answer) ? "" : "hidden"}">
                <div class="split" style="margin-top:10px">
                  <div>
                    <label>Reason</label>
                    <textarea id="rationale_required" placeholder="One short sentence is enough.">${escapeHtml(answer.rationale_required)}</textarea>
                  </div>
                  <div>
                    <label>Optional notes</label>
                    <textarea id="notes_optional" placeholder="Optional."></textarea>
                  </div>
                </div>
              </div>

              <div class="action-bar">
                <button id="saveOnly">Save</button>
                <button id="saveNext" class="primary">Save and Next</button>
              </div>

            </div>
          </div>
        `;

        bindTaskInputs();
        renderSidebar();
      };

      window.renderSidebar = function renderSidebar() {
        const total = state.tasks.length;
        const position = currentPosition();
        const done = Object.values(state.answers).filter(isComplete).length;
        els.currentCounter.textContent = total ? (state.practiceIndex !== null ? (practiceExamples[state.practiceIndex]?.type === "intro" ? "Intro" : practiceExamples[state.practiceIndex]?.title || `Example ${state.practiceIndex}`) : `${state.index + 1} / ${total}`) : "0 / 0";
        els.doneCounter.textContent = String(done);
        els.progressBar.style.width = total ? `${Math.round((done / total) * 100)}%` : "0%";
        els.prevTask.disabled = !total || position === 0;
        els.nextTask.disabled = !total || position >= totalPositions() - 1;
        const practiceNav = practiceExamples.map((example, idx) => {
          const cls = [
            state.practiceIndex === idx ? "current" : "",
            practiceComplete(example) ? "done" : ""
          ].filter(Boolean).join(" ");
          return `<button class="practice-nav ${cls}" data-practice-go="${idx}">${escapeHtml(example.title)}</button>`;
        }).join("");
        const taskNav = state.tasks.map((task, idx) => {
          const answer = state.answers[task.annotation_id];
          const cls = [
            state.practiceIndex === null && idx === state.index ? "current" : "",
            isComplete(answer) ? "done" : ""
          ].filter(Boolean).join(" ");
          return `<button class="${cls}" data-task-go="${idx}">${idx + 1}</button>`;
        }).join("");
        els.taskNav.innerHTML = practiceNav + taskNav;
        els.taskNav.querySelectorAll("[data-practice-go]").forEach(button => {
          button.addEventListener("click", () => {
            if (state.practiceIndex === null) {
              collectCurrentAnswer();
              persistLocal();
            }
            state.practiceIndex = Number(button.dataset.practiceGo);
            state.index = 0;
            renderTask();
          });
        });
        els.taskNav.querySelectorAll("[data-task-go]").forEach(button => {
          button.addEventListener("click", () => {
            if (state.practiceIndex === null) {
              collectCurrentAnswer();
              persistLocal();
            }
            state.practiceIndex = null;
            state.index = Number(button.dataset.taskGo);
            renderTask();
          });
        });
        els.taskNav.querySelector(".current")?.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
      };

      if (state && state.tasks && state.tasks.length) {
        renderTask();
      }
    })();
  </script>

</body>
</html>
